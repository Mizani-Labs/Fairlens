version: 2
owner: data_lead
last_updated: 2026-05-12
purpose: >-
  Deterministic fairness gate policy that yields pass|warn|block decisions for
  release promotion.

metrics:
  disparate_impact_ratio:
    id: di_ratio
    description: ratio of favorable outcome rates for exposed vs reference group
    thresholds:
      block_below: 0.80
      block_above: 1.25
      warn_below: 0.85
      warn_above: 1.18

  difference_in_proportions_significance:
    id: prop_sig
    description: significance and effect-size check for rate differences
    method_selection:
      primary: two_proportion_z_test
      z_test_condition: all_expected_cell_counts_gte_5
      fallback: fisher_exact_two_sided
      fallback_condition: any_expected_cell_count_lt_5
    thresholds:
      alpha_block: 0.05
      alpha_warn: 0.10
      absolute_effect_size_block_min: 0.05
      absolute_effect_size_warn_min: 0.03

  equal_opportunity_gap:
    id: eo_gap
    description: absolute gaps in TPR and FNR between exposed and reference group
    thresholds:
      tpr_gap_abs_block_max: 0.10
      fnr_gap_abs_block_max: 0.10
      tpr_gap_abs_warn_max: 0.08
      fnr_gap_abs_warn_max: 0.08

sample_size_rules:
  cohort_level:
    exposed_min_n: 100
    reference_min_n: 100
    exposed_min_positive: 20
    reference_min_positive: 20
  intersectional_slices:
    exposed_min_n: 50
    reference_min_n: 50
    exposed_min_positive: 10
    reference_min_positive: 10
    min_cells_with_expected_count_gte_5: 3
  insufficient_sample_decision: block
  insufficient_sample_reason_code: INSUFFICIENT_SAMPLE_OR_CELL_SIZE

decision_logic:
  evaluation_granularity:
    - cohort
    - intersectional_slice
  block_if_any:
    - insufficient_sample_or_cell_size
    - di_ratio_outside_block_threshold
    - significance_block_condition_met
    - equal_opportunity_gap_outside_block_threshold
  warn_if_any_and_no_block:
    - di_ratio_outside_warn_threshold
    - significance_warn_condition_met
    - equal_opportunity_gap_outside_warn_threshold
  else: pass

required_evidence_bundle:
  fields:
    - run_id
    - dataset_snapshot_id
    - evaluated_at_utc
    - cohorts_evaluated
    - intersectional_slices_evaluated
    - metrics
    - thresholds_used
    - statistical_tests_used
    - p_values
    - effect_sizes
    - decision_per_slice
    - final_decision
    - triggered_rules
  decision_enum:
    - pass
    - warn
    - block
