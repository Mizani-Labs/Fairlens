version: 1
name: fairlens_milestone_0_5_dag
description: >-
  Directed acyclic graph for Milestone 0 through 5 delivery with explicit
  quality gates, human approvals, and rollback paths for regressions.

phases:
  - intake_foundation
  - offline_sync
  - analytics_fairness
  - policy_review
  - integrated_validation

quality_gates:
  fairness:
    gate_id: qg_fairness
    description: Bias and parity checks across protected cohorts must pass thresholds.
  security:
    gate_id: qg_security
    description: Security controls, vulnerability scans, and threat mitigations validated.
  localization:
    gate_id: qg_localization
    description: Locale coverage and i18n/l10n quality requirements met.
  offline_reliability:
    gate_id: qg_offline_reliability
    description: Offline-first behavior, sync durability, and recovery tests pass.

approval_roles:
  - product_manager
  - security_lead
  - privacy_officer
  - fairness_reviewer
  - localization_lead
  - release_manager

tasks:
  - task_id: M0_T01_scope_alignment
    milestone: 0
    phase: intake_foundation
    owner_agent: planner_agent
    depends_on: []
    artifacts_in:
      - DELIVERY_PLAN.md
    artifacts_out:
      - docs/m0/scope_alignment.md
      - docs/m0/acceptance_criteria.yaml
    quality_gate:
      - security
      - localization
    human_approval_required: true
    approver_role: product_manager

  - task_id: M0_T02_data_inventory
    milestone: 0
    phase: intake_foundation
    owner_agent: data_governance_agent
    depends_on:
      - M0_T01_scope_alignment
    artifacts_in:
      - docs/m0/scope_alignment.md
    artifacts_out:
      - docs/m0/data_inventory.csv
      - docs/m0/data_classification.md
    quality_gate:
      - security
      - fairness
    human_approval_required: true
    approver_role: privacy_officer

  - task_id: M1_T01_offline_contracts
    milestone: 1
    phase: offline_sync
    owner_agent: platform_agent
    depends_on:
      - M0_T02_data_inventory
    artifacts_in:
      - docs/m0/data_classification.md
    artifacts_out:
      - specs/offline/sync_contract.yaml
      - specs/offline/conflict_resolution.md
    quality_gate:
      - offline_reliability
      - security
    human_approval_required: false
    approver_role: release_manager

  - task_id: M1_T02_sync_engine_mvp
    milestone: 1
    phase: offline_sync
    owner_agent: sync_agent
    depends_on:
      - M1_T01_offline_contracts
    artifacts_in:
      - specs/offline/sync_contract.yaml
    artifacts_out:
      - src/sync_engine/
      - tests/offline/test_sync_recovery.yaml
    quality_gate:
      - offline_reliability
      - security
    human_approval_required: false
    approver_role: release_manager

  - task_id: M2_T01_event_taxonomy
    milestone: 2
    phase: analytics_fairness
    owner_agent: analytics_agent
    depends_on:
      - M1_T02_sync_engine_mvp
    artifacts_in:
      - docs/m0/acceptance_criteria.yaml
      - specs/offline/sync_contract.yaml
    artifacts_out:
      - specs/analytics/event_taxonomy.yaml
      - specs/analytics/metric_dictionary.md
    quality_gate:
      - localization
      - fairness
    human_approval_required: false
    approver_role: product_manager

  - task_id: M2_T02_fairness_baseline
    milestone: 2
    phase: analytics_fairness
    owner_agent: fairness_agent
    depends_on:
      - M2_T01_event_taxonomy
      - M0_T02_data_inventory
    artifacts_in:
      - specs/analytics/metric_dictionary.md
      - docs/m0/data_inventory.csv
    artifacts_out:
      - reports/fairness/baseline_report.md
      - reports/fairness/parity_thresholds.yaml
    quality_gate:
      - fairness
      - security
    human_approval_required: true
    approver_role: fairness_reviewer

  - task_id: M3_T01_policy_mapping
    milestone: 3
    phase: policy_review
    owner_agent: policy_agent
    depends_on:
      - M2_T02_fairness_baseline
    artifacts_in:
      - reports/fairness/baseline_report.md
      - docs/m0/data_classification.md
    artifacts_out:
      - policies/privacy_control_matrix.yaml
      - policies/data_retention_rules.md
    quality_gate:
      - security
      - fairness
    human_approval_required: true
    approver_role: privacy_officer

  - task_id: M3_T02_threat_privacy_review
    milestone: 3
    phase: policy_review
    owner_agent: security_agent
    depends_on:
      - M3_T01_policy_mapping
      - M1_T02_sync_engine_mvp
    artifacts_in:
      - policies/privacy_control_matrix.yaml
      - specs/offline/conflict_resolution.md
    artifacts_out:
      - reports/security/threat_model.md
      - reports/security/privacy_regression_tests.yaml
    quality_gate:
      - security
      - offline_reliability
    human_approval_required: true
    approver_role: security_lead

  - task_id: M4_T01_localization_packaging
    milestone: 4
    phase: integrated_validation
    owner_agent: localization_agent
    depends_on:
      - M2_T01_event_taxonomy
    artifacts_in:
      - specs/analytics/event_taxonomy.yaml
      - docs/m0/acceptance_criteria.yaml
    artifacts_out:
      - i18n/locale_matrix.yaml
      - i18n/translation_qa_report.md
    quality_gate:
      - localization
      - fairness
    human_approval_required: true
    approver_role: localization_lead

  - task_id: M4_T02_end_to_end_validation
    milestone: 4
    phase: integrated_validation
    owner_agent: qa_agent
    depends_on:
      - M3_T02_threat_privacy_review
      - M4_T01_localization_packaging
      - M1_T02_sync_engine_mvp
    artifacts_in:
      - reports/security/privacy_regression_tests.yaml
      - reports/fairness/parity_thresholds.yaml
      - tests/offline/test_sync_recovery.yaml
      - i18n/translation_qa_report.md
    artifacts_out:
      - reports/validation/e2e_results.md
      - reports/validation/gate_status.yaml
    quality_gate:
      - fairness
      - security
      - localization
      - offline_reliability
    human_approval_required: true
    approver_role: release_manager

  - task_id: M5_T01_release_readiness
    milestone: 5
    phase: integrated_validation
    owner_agent: release_agent
    depends_on:
      - M4_T02_end_to_end_validation
    artifacts_in:
      - reports/validation/e2e_results.md
      - reports/validation/gate_status.yaml
    artifacts_out:
      - release/m5/readiness_checklist.md
      - release/m5/go_no_go_record.md
    quality_gate:
      - fairness
      - security
      - localization
      - offline_reliability
    human_approval_required: true
    approver_role: release_manager

rollback_edges:
  - on_failed_gate: fairness
    from_task_id: M2_T02_fairness_baseline
    rollback_to_task_id: M2_T01_event_taxonomy
    rationale: Rework metric definitions and cohort segmentation before re-baselining.

  - on_failed_gate: fairness
    from_task_id: M4_T02_end_to_end_validation
    rollback_to_task_id: M2_T02_fairness_baseline
    rationale: Fairness regression detected in integrated flow; recalibrate thresholds and controls.

  - on_failed_gate: security
    from_task_id: M3_T02_threat_privacy_review
    rollback_to_task_id: M3_T01_policy_mapping
    rationale: Unmitigated threats require policy and control remapping.

  - on_failed_gate: security
    from_task_id: M4_T02_end_to_end_validation
    rollback_to_task_id: M3_T02_threat_privacy_review
    rationale: Security regression in integrated testing requires threat model updates.

  - on_failed_gate: privacy
    from_task_id: M3_T02_threat_privacy_review
    rollback_to_task_id: M0_T02_data_inventory
    rationale: Privacy regression requires refreshed data inventory and classification review.

  - on_failed_gate: privacy
    from_task_id: M4_T02_end_to_end_validation
    rollback_to_task_id: M3_T01_policy_mapping
    rationale: Privacy controls failed in integrated validation; policy mapping must be corrected.

  - on_failed_gate: localization
    from_task_id: M4_T01_localization_packaging
    rollback_to_task_id: M2_T01_event_taxonomy
    rationale: Terminology mismatch requires taxonomy updates and re-translation.

  - on_failed_gate: offline_reliability
    from_task_id: M4_T02_end_to_end_validation
    rollback_to_task_id: M1_T02_sync_engine_mvp
    rationale: Offline durability issues require sync engine hardening.
